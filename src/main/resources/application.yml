server:
  port: 8083


spring:
  datasource:
    url: jdbc:mysql://localhost:3306/micro
    username: root
    password: root@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  application:
    name: RATING-SERVICE

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    root: INFO
    com.micro.rating: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
